<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d8d8d8" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#fbf7ea"/>
  <rect x="40" y="40" width="1120" height="700" fill="url(#grid)" stroke="#333" stroke-width="3" rx="10"/>

  <text x="600" y="28" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, Arial" fill="#222">
    F407 光学雨量检测洞洞板草稿布局：左模电，右数电
  </text>

  <rect x="70" y="80" width="470" height="610" fill="#eaf7ee" stroke="#2d7a42" stroke-width="3" rx="8"/>
  <rect x="660" y="80" width="470" height="610" fill="#eaf1ff" stroke="#2f5fa8" stroke-width="3" rx="8"/>
  <rect x="555" y="80" width="90" height="610" fill="#fff3cc" stroke="#b8860b" stroke-width="2" stroke-dasharray="10 8" rx="8"/>

  <text x="305" y="118" text-anchor="middle" font-size="28" font-family="Microsoft YaHei, Arial" fill="#1f6334">模电区 Analog</text>
  <text x="895" y="118" text-anchor="middle" font-size="28" font-family="Microsoft YaHei, Arial" fill="#244f91">数电区 Digital</text>
  <text x="600" y="120" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, Arial" fill="#6b5200">隔离带</text>
  <text x="600" y="148" text-anchor="middle" font-size="16" font-family="Microsoft YaHei, Arial" fill="#6b5200">至少 1 cm</text>

  <rect x="100" y="160" width="160" height="70" fill="#fff" stroke="#333" stroke-width="2" rx="6"/>
  <text x="180" y="190" text-anchor="middle" font-size="18" font-family="Microsoft YaHei, Arial" fill="#222">红外 LED</text>
  <text x="180" y="214" text-anchor="middle" font-size="14" font-family="Microsoft YaHei, Arial" fill="#555">发射端</text>

  <rect x="100" y="280" width="160" height="70" fill="#fff" stroke="#333" stroke-width="2" rx="6"/>
  <text x="180" y="310" text-anchor="middle" font-size="18" font-family="Microsoft YaHei, Arial" fill="#222">光电二极管</text>
  <text x="180" y="334" text-anchor="middle" font-size="14" font-family="Microsoft YaHei, Arial" fill="#555">接收端</text>

  <rect x="330" y="250" width="160" height="120" fill="#fff" stroke="#333" stroke-width="2" rx="6"/>
  <text x="410" y="290" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, Arial" fill="#222">LM358</text>
  <text x="410" y="318" text-anchor="middle" font-size="15" font-family="Microsoft YaHei, Arial" fill="#555">缓冲/放大</text>
  <text x="410" y="342" text-anchor="middle" font-size="15" font-family="Microsoft YaHei, Arial" fill="#555">100nF 贴近电源脚</text>

  <rect x="330" y="430" width="160" height="70" fill="#fff" stroke="#333" stroke-width="2" rx="6"/>
  <text x="410" y="460" text-anchor="middle" font-size="18" font-family="Microsoft YaHei, Arial" fill="#222">RC 滤波</text>
  <text x="410" y="484" text-anchor="middle" font-size="14" font-family="Microsoft YaHei, Arial" fill="#555">靠近运放输出</text>

  <rect x="720" y="170" width="190" height="120" fill="#fff" stroke="#333" stroke-width="2" rx="6"/>
  <text x="815" y="215" text-anchor="middle" font-size="22" font-family="Microsoft YaHei, Arial" fill="#222">STM32F407</text>
  <text x="815" y="244" text-anchor="middle" font-size="15" font-family="Microsoft YaHei, Arial" fill="#555">PA0 ADC 输入</text>
  <text x="815" y="268" text-anchor="middle" font-size="15" font-family="Microsoft YaHei, Arial" fill="#555">PA9/PA10 串口</text>

  <rect x="950" y="180" width="140" height="80" fill="#fff" stroke="#333" stroke-width="2" rx="6"/>
  <text x="1020" y="212" text-anchor="middle" font-size="18" font-family="Microsoft YaHei, Arial" fill="#222">USB-TTL</text>
  <text x="1020" y="238" text-anchor="middle" font-size="14" font-family="Microsoft YaHei, Arial" fill="#555">调试串口</text>

  <rect x="720" y="380" width="170" height="80" fill="#fff" stroke="#333" stroke-width="2" rx="6"/>
  <text x="805" y="414" text-anchor="middle" font-size="18" font-family="Microsoft YaHei, Arial" fill="#222">电源入口</text>
  <text x="805" y="440" text-anchor="middle" font-size="14" font-family="Microsoft YaHei, Arial" fill="#555">3.3V / GND</text>

  <path d="M 260 315 C 290 315, 300 310, 330 310" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="295" y="300" text-anchor="middle" font-size="14" font-family="Microsoft YaHei, Arial" fill="#222">SENSE 短线</text>

  <path d="M 490 310 C 535 310, 610 230, 720 230" fill="none" stroke="#d14b3f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="600" y="215" text-anchor="middle" font-size="15" font-family="Microsoft YaHei, Arial" fill="#b33b31">模拟输出只走一根到 PA0</text>

  <path d="M 910 230 C 930 230, 930 220, 950 220" fill="none" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="930" y="205" text-anchor="middle" font-size="14" font-family="Microsoft YaHei, Arial" fill="#222">USART</text>

  <line x1="80" y1="650" x2="530" y2="650" stroke="#2d7a42" stroke-width="5"/>
  <line x1="670" y1="650" x2="1120" y2="650" stroke="#2f5fa8" stroke-width="5"/>
  <path d="M 530 650 C 560 650, 570 650, 590 650 L 610 650 C 630 650, 640 650, 670 650" fill="none" stroke="#333" stroke-width="5"/>
  <circle cx="600" cy="650" r="10" fill="#333"/>
  <text x="305" y="675" text-anchor="middle" font-size="16" font-family="Microsoft YaHei, Arial" fill="#1f6334">模拟地线沿板边走</text>
  <text x="895" y="675" text-anchor="middle" font-size="16" font-family="Microsoft YaHei, Arial" fill="#244f91">数字地线沿板边走</text>
  <text x="600" y="690" text-anchor="middle" font-size="16" font-family="Microsoft YaHei, Arial" fill="#222">单点共地</text>

  <text x="95" y="560" font-size="16" font-family="Microsoft YaHei, Arial" fill="#222">模电区注意：</text>
  <text x="95" y="588" font-size="15" font-family="Microsoft YaHei, Arial" fill="#222">1. 光电管到 LM358 输入线越短越好</text>
  <text x="95" y="614" font-size="15" font-family="Microsoft YaHei, Arial" fill="#222">2. 输入信号旁边伴随一根地线</text>

  <text x="720" y="540" font-size="16" font-family="Microsoft YaHei, Arial" fill="#222">数电区注意：</text>
  <text x="720" y="568" font-size="15" font-family="Microsoft YaHei, Arial" fill="#222">1. F407、下载口、USB-TTL 放右侧</text>
  <text x="720" y="594" font-size="15" font-family="Microsoft YaHei, Arial" fill="#222">2. 串口线不要穿过模电输入区</text>
  <text x="720" y="620" font-size="15" font-family="Microsoft YaHei, Arial" fill="#222">3. 电源先到数电，再单点分到模电</text>
</svg>
