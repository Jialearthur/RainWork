<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <pattern id="holes" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.6" fill="#eadfbd"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#2368b0"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#c43d32"/>
    </marker>
    <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#f6f1df"/>
  <text x="700" y="42" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="30" fill="#222">
    洞洞板布局新手图：左接收放大，右 PWM LED 驱动，F407 通过 4P 排针外接
  </text>

  <rect x="80" y="80" width="1240" height="740" fill="#fffaf0" stroke="#444" stroke-width="6"/>
  <rect x="96" y="96" width="1208" height="708" fill="url(#holes)" stroke="#777" stroke-width="2"/>

  <line x1="110" y1="150" x2="1270" y2="150" stroke="#d8433e" stroke-width="8"/>
  <text x="180" y="132" font-family="Microsoft YaHei, Arial" font-size="20" fill="#c43d32">+3.3V 总线，建议用铜丝</text>

  <line x1="700" y1="170" x2="700" y2="760" stroke="#777" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="700" y="205" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="22" fill="#555">中间隔离带</text>
  <text x="700" y="235" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#555">尽量少穿线</text>

  <rect x="125" y="185" width="510" height="470" rx="12" fill="#edf6ff" stroke="#2368b0" stroke-width="4"/>
  <text x="380" y="225" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="28" font-weight="700" fill="#2368b0">
    接收 + 放大区，敏感
  </text>

  <circle cx="190" cy="300" r="32" fill="#f9fcff" stroke="#2368b0" stroke-width="3"/>
  <text x="190" y="294" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#222">D2</text>
  <text x="190" y="318" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="15" fill="#555">PD204</text>

  <rect x="285" y="270" width="250" height="125" rx="8" fill="#fff" stroke="#2368b0" stroke-width="3"/>
  <text x="410" y="315" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="30" fill="#2368b0">U1 LM358</text>
  <text x="410" y="350" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#555">接收信号缓冲 / 放大</text>

  <path d="M222 300 C250 300,255 330,285 330" fill="none" stroke="#2368b0" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <text x="255" y="288" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" fill="#2368b0">输入线要短</text>

  <rect x="170" y="470" width="95" height="42" rx="5" fill="#fff" stroke="#2368b0" stroke-width="3"/>
  <text x="217" y="497" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="17" fill="#222">C4 100nF</text>
  <rect x="285" y="470" width="95" height="42" rx="5" fill="#fff" stroke="#2368b0" stroke-width="3"/>
  <text x="332" y="497" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="17" fill="#222">C5 10uF</text>
  <text x="275" y="540" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#2368b0">退耦电容靠近 LM358 电源脚</text>

  <rect x="440" y="455" width="135" height="95" rx="6" fill="#fff" stroke="#2368b0" stroke-width="3"/>
  <text x="508" y="490" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#222">反馈 / 输出</text>
  <text x="508" y="520" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" fill="#555">R、C 元件群</text>

  <circle cx="620" cy="285" r="12" fill="#ffb02e" stroke="#333" stroke-width="2"/>
  <circle cx="620" cy="325" r="12" fill="#ffb02e" stroke="#333" stroke-width="2"/>
  <circle cx="620" cy="365" r="12" fill="#ffb02e" stroke="#333" stroke-width="2"/>
  <text x="642" y="292" font-family="Microsoft YaHei, Arial" font-size="17" fill="#333">TP1 接收原始</text>
  <text x="642" y="332" font-family="Microsoft YaHei, Arial" font-size="17" fill="#333">TP2 一级输出</text>
  <text x="642" y="372" font-family="Microsoft YaHei, Arial" font-size="17" fill="#333">TP3 二级输出</text>

  <rect x="765" y="185" width="450" height="305" rx="12" fill="#fff3ef" stroke="#c43d32" stroke-width="4"/>
  <text x="990" y="225" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="28" font-weight="700" fill="#c43d32">
    PWM + LED 驱动区，噪声源
  </text>

  <rect x="835" y="280" width="95" height="46" rx="5" fill="#fff" stroke="#c43d32" stroke-width="3"/>
  <text x="882" y="310" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="17" fill="#222">R1 1k</text>
  <circle cx="990" cy="302" r="36" fill="#fff" stroke="#c43d32" stroke-width="4"/>
  <text x="990" y="308" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="20" fill="#222">Q1</text>
  <text x="990" y="350" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" fill="#555">S8050</text>

  <rect x="835" y="375" width="95" height="46" rx="5" fill="#fff" stroke="#c43d32" stroke-width="3"/>
  <text x="882" y="405" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="17" fill="#222">R2 120R</text>
  <circle cx="990" cy="400" r="36" fill="#fff" stroke="#c43d32" stroke-width="4"/>
  <text x="990" y="406" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="20" fill="#222">D1</text>
  <text x="990" y="448" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" fill="#555">IR204C</text>

  <path d="M760 360 C795 360,805 303,835 303" fill="none" stroke="#c43d32" stroke-width="5" marker-end="url(#arrowRed)"/>
  <text x="785" y="340" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="17" fill="#c43d32">PWM 进来</text>

  <rect x="850" y="560" width="300" height="125" rx="10" fill="#fff8d8" stroke="#f0a000" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="1000" y="600" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="24" font-weight="700" fill="#9a6900">光学头处理</text>
  <text x="1000" y="635" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#333">LED 和 PD 斜置约 30°</text>
  <text x="1000" y="663" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#333">遮光、固定、对准接雨面</text>

  <rect x="280" y="705" width="500" height="70" rx="8" fill="#fff" stroke="#333" stroke-width="3"/>
  <text x="530" y="695" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="20" fill="#222">4P 排针，通过杜邦线接 F407</text>

  <circle cx="350" cy="740" r="13" fill="#e24c4b" stroke="#222" stroke-width="2"/>
  <circle cx="470" cy="740" r="13" fill="#777" stroke="#222" stroke-width="2"/>
  <circle cx="590" cy="740" r="13" fill="#c67b32" stroke="#222" stroke-width="2"/>
  <circle cx="710" cy="740" r="13" fill="#2f78c4" stroke="#222" stroke-width="2"/>
  <text x="350" y="770" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#c43d32">3V3</text>
  <text x="470" y="770" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#333">GND</text>
  <text x="590" y="770" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#9b4e13">PWM</text>
  <text x="710" y="770" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#2368b0">SIG</text>

  <path d="M535 330 C585 330,650 535,710 705" fill="none" stroke="#2368b0" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <text x="630" y="540" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#2368b0">LM358 输出到 SIG</text>
  <path d="M590 705 C625 600,680 430,760 360" fill="none" stroke="#c43d32" stroke-width="5" marker-end="url(#arrowRed)"/>
  <text x="650" y="622" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#c43d32">PWM 到右侧驱动</text>

  <line x1="120" y1="790" x2="1280" y2="790" stroke="#333" stroke-width="5"/>
  <circle cx="700" cy="790" r="15" fill="#ff6b38" stroke="#333" stroke-width="3"/>
  <text x="700" y="842" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="21" fill="#c43d32">
    模拟地 + 数字地只在这里单点连接，0Ω 电阻或短铜丝
  </text>

  <rect x="1085" y="255" width="155" height="95" rx="8" fill="#fff" stroke="#999" stroke-width="2"/>
  <text x="1162" y="288" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#333">焊接顺序</text>
  <text x="1162" y="318" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="15" fill="#555">先 GND/VCC</text>
  <text x="1162" y="342" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="15" fill="#555">再 U1、D2、Q1/D1</text>
</svg>
